<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Collective</title>
<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    color: #e8e8e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .wrap {
    text-align: center;
    padding: 40px 24px;
    max-width: 560px;
    width: 100%;
    animation: fadein 1.2s ease forwards;
    opacity: 0;
  }
  @keyframes fadein { to { opacity: 1; } }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 96px);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: #e8e8e0;
    margin-bottom: 8px;
  }
  .logo span { color: #c8ff00; }
  .sub {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #555;
    margin-bottom: 48px;
    text-transform: uppercase;
  }
  .tagline {
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .location {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #333;
    text-transform: uppercase;
  }
  /* Override Brevo styles */
  .sib-form { background: transparent !important; padding: 0 !important; }
  .sib-form-container { background: transparent !important; }
  #sib-container {
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    max-width: 420px !important;
    margin: 0 auto !important;
    padding: 0 !important;
  }
  #sib-form { display: flex !important; gap: 0 !important; }
  .sib-input { flex: 1 !important; padding: 0 !important; }
  .form__entry { margin: 0 !important; }
  .form__label-row { margin: 0 !important; }
  .entry__field { margin: 0 !important; }
  #sib-container input#EMAIL {
    width: 100% !important;
    background: #111 !important;
    border: 1px solid #2a2a2a !important;
    border-right: none !important;
    color: #e8e8e0 !important;
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 13px !important;
    padding: 14px 16px !important;
    outline: none !important;
    border-radius: 0 !important;
    letter-spacing: 0.05em !important;
    height: 48px !important;
  }
  #sib-container input#EMAIL::placeholder { color: #444 !important; }
  #sib-container input#EMAIL:focus { border-color: #c8ff00 !important; }
  .sib-form-block { padding: 0 !important; }
  .sib-form-block__button {
    background: #c8ff00 !important;
    border: 1px solid #c8ff00 !important;
    color: #080808 !important;
    font-family: 'Bebas Neue', sans-serif !important;
    font-size: 16px !important;
    letter-spacing: 0.1em !important;
    padding: 0 24px !important;
    height: 48px !important;
    border-radius: 0 !important;
    cursor: pointer !important;
    white-space: nowrap !important;
    font-weight: normal !important;
  }
  .sib-form-block__button:hover {
    background: #080808 !important;
    color: #c8ff00 !important;
  }
  .entry__specification { display: none !important; }
  .entry__error { display: none !important; }
  #success-message {
    background: transparent !important;
    border: none !important;
    color: #c8ff00 !important;
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 12px !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    text-align: center !important;
    padding: 16px 0 0 !important;
  }
  #success-message .sib-form-message-panel__text { color: #c8ff00 !important; }
  #success-message svg { display: none !important; }
  #error-message {
    background: transparent !important;
    border: none !important;
    color: #e05c20 !important;
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 12px !important;
    text-align: center !important;
    padding: 16px 0 0 !important;
  }
  #error-message svg { display: none !important; }
  .sib-icon { display: none !important; }
  input.input--hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">WAREHOUSE<br><span>COLLECTIVE</span></div>
  <div class="sub">San Francisco</div>
  <div class="tagline">Enroll for live events</div>

  <div class="sib-form">
    <div id="sib-form-container" class="sib-form-container">
      <div id="error-message" class="sib-form-message-panel">
        <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
          <span class="sib-form-message-panel__inner-text">// Subscription failed. Try again.</span>
        </div>
      </div>
      <div id="success-message" class="sib-form-message-panel">
        <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
          <span class="sib-form-message-panel__inner-text">// You're on the list.</span>
        </div>
      </div>
      <div id="sib-container" class="sib-container--large sib-container--vertical">
        <form id="sib-form" method="POST" action="https://53c4afeb.sibforms.com/serve/MUIFAE6s2CrDzKOvkGrfqvR6npHaqcJXcAlUoPWl4pb2l9l622pAV9fHAm1fdYrEGnudLXklkaGkqKRc9yaiRYh-K0HFRTd7iBJEj1BqPkDYSG16G0FKASsIsrQreQb_XVp6t0s5X4yxQMmPVLgp4JqpGg6ufRencwx83Wh6RAfTomt1fsubtZysmskdFqUs58YZ47NIq_qI7Cm_iQ==" data-type="subscription">
          <div class="sib-input sib-form-block">
            <div class="form__entry entry_block">
              <div class="form__label-row">
                <div class="entry__field">
                  <input class="input" type="text" id="EMAIL" name="EMAIL" autocomplete="off" placeholder="your@email.com" data-required="true" required />
                </div>
              </div>
              <label class="entry__error entry__error--primary"></label>
            </div>
          </div>
          <div class="sib-form-block">
            <button class="sib-form-block__button sib-form-block__button-with-loader" form="sib-form" type="submit">
              <svg class="icon clickable__icon progress-indicator__icon sib-hide-loader-icon" viewBox="0 0 512 512">
                <path d="M460.116 373.846l-20.823-12.022c-5.541-3.199-7.54-10.159-4.663-15.874 30.137-59.886 28.343-131.652-5.386-189.946-33.641-58.394-94.896-95.833-161.827-99.676C261.028 55.961 256 50.751 256 44.352V20.309c0-6.904 5.808-12.337 12.703-11.982 83.556 4.306 160.163 50.864 202.11 123.677 42.063 72.696 44.079 162.316 6.031 236.832-3.14 6.148-10.75 8.461-16.728 5.01z" />
              </svg>
              ENROLL
            </button>
          </div>
          <input type="text" name="email_address_check" value="" class="input--hidden">
          <input type="hidden" name="locale" value="en">
        </form>
      </div>
    </div>
  </div>

  <div class="location">SAN FRANCISCO · EST. 2026</div>
</div>

<script>
  window.REQUIRED_CODE_ERROR_MESSAGE = 'Please choose a country code';
  window.LOCALE = 'en';
  window.EMAIL_INVALID_MESSAGE = window.SMS_INVALID_MESSAGE = "Invalid email. Please try again.";
  window.REQUIRED_ERROR_MESSAGE = "This field cannot be left blank.";
  window.GENERIC_INVALID_MESSAGE = "Invalid information. Please try again.";
  window.translation = {
    common: {
      selectedList: '{quantity} list selected',
      selectedLists: '{quantity} lists selected',
      selectedOption: '{quantity} selected',
      selectedOptions: '{quantity} selected',
    }
  };
  var AUTOHIDE = Boolean(0);
</script>
<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>
</body>
</html>
