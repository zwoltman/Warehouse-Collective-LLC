<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Collective</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    color: #e8e8e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .wrap {
    text-align: center;
    padding: 40px 24px;
    max-width: 560px;
    width: 100%;
    animation: fadein 1.2s ease forwards;
    opacity: 0;
  }
  @keyframes fadein { to { opacity: 1; } }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 96px);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: #e8e8e0;
    margin-bottom: 8px;
  }
  .logo span { color: #c8ff00; }
  .sub {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #555;
    margin-bottom: 48px;
    text-transform: uppercase;
  }
  .tagline {
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .location {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #333;
    text-transform: uppercase;
  }
  .form-row {
    display: flex;
    max-width: 420px;
    margin: 0 auto;
  }
  .form-row input {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-right: none;
    color: #e8e8e0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 14px 16px;
    outline: none;
    border-radius: 0;
    letter-spacing: 0.05em;
    height: 48px;
    -webkit-appearance: none;
  }
  .form-row input::placeholder { color: #444; }
  .form-row input:focus { border-color: #c8ff00; }
  .form-row button {
    background: #c8ff00;
    border: 1px solid #c8ff00;
    color: #080808;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 0 24px;
    height: 48px;
    border-radius: 0;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .form-row button:hover {
    background: #080808;
    color: #c8ff00;
  }
  .msg {
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-height: 20px;
  }
  .msg.success { color: #c8ff00; }
  .msg.error { color: #e05c20; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">WAREHOUSE<br><span>COLLECTIVE</span></div>
  <div class="sub">San Francisco</div>
  <div class="tagline">Enroll for live events</div>

  <div class="form-row">
    <input type="email" id="email" placeholder="your@email.com" />
    <button onclick="handleSubmit()">ENROLL</button>
  </div>
  <div class="msg" id="msg"></div>

  <div class="location">SAN FRANCISCO · EST. 2026</div>
</div>

<script>
  function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('msg');

    if (!email || !email.includes('@')) {
      document.getElementById('email').style.borderColor = '#e05c20';
      msg.textContent = '// invalid email.';
      msg.className = 'msg error';
      return;
    }

    const btn = document.querySelector('.form-row button');
    btn.textContent = '...';
    btn.disabled = true;

    const formData = new FormData();
    formData.append('EMAIL', email);
    formData.append('email_address_check', '');
    formData.append('locale', 'en');

    fetch('https://53c4afeb.sibforms.com/serve/MUIFAE6s2CrDzKOvkGrfqvR6npHaqcJXcAlUoPWl4pb2l9l622pAV9fHAm1fdYrEGnudLXklkaGkqKRc9yaiRYh-K0HFRTd7iBJEj1BqPkDYSG16G0FKASsIsrQreQb_XVp6t0s5X4yxQMmPVLgp4JqpGg6ufRencwx83Wh6RAfTomt1fsubtZysmskdFqUs58YZ47NIq_qI7Cm_iQ==', {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    }).then(() => {
      document.querySelector('.form-row').style.display = 'none';
      msg.textContent = '// you\'re on the list.';
      msg.className = 'msg success';
    }).catch(() => {
      btn.textContent = 'ENROLL';
      btn.disabled = false;
      msg.textContent = '// something went wrong. try again.';
      msg.className = 'msg error';
    });
  }

  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
